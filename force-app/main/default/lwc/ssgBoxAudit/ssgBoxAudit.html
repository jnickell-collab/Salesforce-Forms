<template>
    <lightning-card class="audit-card">
        <div class="audit-card-title">Box Audit</div>
        <div class="audit-shell">
            <div class="audit-toolbar theme-panel theme-panel--soft theme-panel--lift theme-responsive-panel">
                <div class="audit-input-block">
                    <p class="audit-input-label">Scan or Enter Barcode</p>
                    <lightning-input label="Scan or Enter Barcode" variant="label-hidden" value={barcode} onchange={handleBarcodeChange} onkeyup={handleBarcodeKeyup} placeholder="Scan barcode here..." data-barcode-input></lightning-input>
                </div>
                <div class="audit-actions">
                    <div class="audit-button-slot">
                        <lightning-button class="audit-action-button" label="Search" onclick={handleSearch}></lightning-button>
                    </div>
                    <div class="audit-button-slot">
                        <lightning-button class="audit-action-button" label="Clear" onclick={handleClear}></lightning-button>
                    </div>
                    <div class="audit-button-slot">
                        <lightning-button class="audit-action-button" variant="brand" icon-name="utility:scan" label="Scan" onclick={beginScanning}></lightning-button>
                    </div>
                </div>
            </div>
        </div>
        <template if:true={hasItemDetails}>
            <div class="audit-results theme-panel theme-panel--feature theme-responsive-panel slds-m-top_medium">
                <template for:each={itemDetails} for:item="item">
                    <div key={item.id} class={item.cardClass}>
                        <div class="ssg-field-row ssg-field-row--ticket">
                            <span class="ssg-field-label">Pick Ticket ID</span>
                            <span class="ssg-field-value ssg-field-value--numeric">{item.pickTicketId}</span>
                        </div>
                        <div class="ssg-field-grid ssg-field-grid--identity">
                            <div class="ssg-field-row">
                                <span class="ssg-field-label">SKU</span>
                                <span class="ssg-field-value">{item.sku}</span>
                            </div>
                            <div class="ssg-field-row ssg-field-row--full">
                                <span class="ssg-field-label">UPC</span>
                                <span class="ssg-field-value">{item.upc}</span>
                            </div>
                            <div class="ssg-field-row ssg-field-row--stacked ssg-field-row--full">
                                <span class="ssg-field-label">Description</span>
                                <span class="ssg-field-value ssg-field-value--stacked">{item.skuDescription}</span>
                            </div>
                        </div>

                        <div class="ssg-field-grid ssg-field-grid--metrics">
                            <div class="ssg-field-row">
                                <span class="ssg-field-label">Qty To Pick</span>
                                <span class="ssg-field-value ssg-field-value--numeric">{item.qtyToPick}</span>
                            </div>
                            <div class="ssg-field-row">
                                <span class="ssg-field-label">Qty Picked</span>
                                <span class="ssg-field-value ssg-field-value--numeric">{item.qtyPicked}</span>
                            </div>
                            <div class="ssg-field-row">
                                <span class="ssg-field-label">Holds Qty Picked</span>
                                <span class="ssg-field-value ssg-field-value--numeric">{item.hlQtyPicked}</span>
                            </div>
                        </div>

                        <div class="ssg-field-grid">
                            <div class="ssg-field-row">
                                <span class="ssg-field-label">Holds Available Qty</span>
                                <span class="ssg-field-value ssg-field-value--numeric">{item.holdsAvailableQty}</span>
                            </div>
                            <div class="ssg-field-row">
                                <span class="ssg-field-label">WHS Location</span>
                                <span class="ssg-field-value">{item.whsLocation}</span>
                            </div>
                        </div>
                        <div class="ssg-divider"></div>

                        <div class="ssg-s2k-group">
                            <div class="ssg-section-label">S2K</div>
                            <div class="ssg-field-grid ssg-field-grid--metrics">
                                <div class="ssg-field-row ssg-field-row--accent">
                                    <span class="ssg-field-label">On Hand</span>
                                    <span class="ssg-field-value ssg-field-value--numeric">{item.s2kOnHand}</span>
                                </div>
                                <div class="ssg-field-row ssg-field-row--accent">
                                    <span class="ssg-field-label">Committed</span>
                                    <span class="ssg-field-value ssg-field-value--numeric">{item.s2kCommitted}</span>
                                </div>
                                <div class="ssg-field-row ssg-field-row--accent">
                                    <span class="ssg-field-label">Available</span>
                                    <span class="ssg-field-value ssg-field-value--numeric">{item.s2kAvailable}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>
        <button if:true={showBackToTop} class="ssg-back-to-top" onclick={scrollToTop} title="Back to Top" aria-label="Back to Top">↑</button>
    </lightning-card>
</template>
