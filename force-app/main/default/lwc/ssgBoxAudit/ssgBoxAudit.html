<template>
    <lightning-card title="Box Audit" class="audit-card">
        <div class="audit-shell theme-app-shell">
            <div class="audit-toolbar theme-panel theme-panel--soft theme-panel--lift theme-responsive-panel">
            <lightning-input label="Scan or Enter Barcode" value={barcode} onchange={handleBarcodeChange} onkeyup={handleBarcodeKeyup} placeholder="Scan barcode here..." data-barcode-input></lightning-input>
            <div class="audit-actions slds-m-top_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div class="audit-action-group slds-grid slds-grid_vertical-align-center slds-gutters">
                    <lightning-button label="Search" onclick={handleSearch}></lightning-button>
                    <lightning-button label="Clear" onclick={handleClear}></lightning-button>
                </div>
                <lightning-button variant="brand" icon-name="utility:scan" label="Scan" onclick={beginScanning}></lightning-button>
            </div>
        </div>
        </div>



        <template if:true={itemDetails}>
            <div class="audit-results theme-panel theme-panel--feature theme-responsive-panel slds-m-top_medium">
                <template for:each={itemDetails} for:item="item">
                    <div key={item.id} class={item.cardClass}>
                        <h4>Pick Ticket ID: <span class="ssg-mobile-value">{item.pickTicketId}</span></h4>
                        <div class="ssg-sku-row">
                            <div class="ssg-mobile-label">SKU:<span class="ssg-mobile-value">{item.sku}</span></div>
                            <div class="ssg-mobile-label">Description:<span class="ssg-mobile-value">{item.skuDescription}</span></div>
                        </div>
                        <div class="ssg-sku-row">
                            <div class="ssg-mobile-label">UPC:<span class="ssg-mobile-value">{item.upc}</span></div>
                        </div>
                        <div class="ssg-sku-row">
                            <div class="ssg-mobile-label">Qty To Pick:<span class="ssg-mobile-value">{item.qtyToPick}</span></div>
                            <div class="ssg-mobile-label">Qty Picked:<span class="ssg-mobile-value">{item.qtyPicked}</span></div>
                            <div class="ssg-mobile-label">HL Qty Picked:<span class="ssg-mobile-value">{item.hlQtyPicked}</span></div>
                        </div>
                        <div class="ssg-sku-row">
                            <div class="ssg-mobile-label">Holds Available Qty:<span class="ssg-mobile-value">{item.holdsAvailableQty}</span></div>
                            <div class="ssg-mobile-label">WHS Location:<span class="ssg-mobile-value">{item.whsLocation}</span></div>
                        </div>
                        <div class="ssg-divider"></div>
                        <div class="ssg-sku-row">
                            <div class="ssg-mobile-label ssg-mobile-s2k">S2K On Hand:<span class="ssg-mobile-value">{item.s2kOnHand}</span></div>
                            <div class="ssg-mobile-label ssg-mobile-s2k">S2K Committed:<span class="ssg-mobile-value">{item.s2kCommitted}</span></div>
                            <div class="ssg-mobile-label ssg-mobile-s2k">S2K Available:<span class="ssg-mobile-value">{item.s2kAvailable}</span></div>
                        </div>
                    </div>
                </template>
            </div>
        </template>
        <button if:true={showBackToTop} class="ssg-back-to-top" onclick={scrollToTop} title="Back to Top">
            ↑ Top
        </button>
    </lightning-card>
</template>
